<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多言語翻訳モニター</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
    }

    #translatedBox {
      position: sticky;
      top: 0;
      z-index: 999;
      background: #111;
      color: #fff;
      padding: 28px 20px;
      font-size: 44px;
      font-weight: bold;
      line-height: 1.4;
      min-height: 120px;
      box-sizing: border-box;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
      background: #222;
    }

    .tabs button {
      flex: 1;
      min-width: 120px;
      padding: 14px 10px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #555;
      color: #fff;
    }

    .tabs button.active {
      background: #007aff;
      font-weight: bold;
    }

    .controls {
      padding: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .controls button {
      flex: 1;
      min-width: 140px;
      padding: 16px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      color: #fff;
    }

    #startBtn {
      background: #008000;
    }

    #stopBtn {
      background: #cc0000;
    }

    textarea {
      width: calc(100% - 32px);
      margin: 16px;
      height: 140px;
      font-size: 22px;
      padding: 12px;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #sourceText {
      margin: 16px;
      padding: 12px;
      background: #fff;
      border-radius: 8px;
      font-size: 20px;
      min-height: 60px;
    }

    .label {
      margin: 16px 16px 0;
      font-weight: bold;
      color: #555;
    }

    #status {
      margin: 0 16px 16px;
      color: #666;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div id="translatedBox">
    翻訳結果がここに表示されます
  </div>

  <div class="tabs">
    <button class="active" onclick="setLang('vi', this)">ベトナム語</button>
    <button onclick="setLang('en', this)">英語</button>
    <button onclick="setLang('es', this)">スペイン語</button>
    <button onclick="setLang('pt', this)">ポルトガル語</button>
    <button onclick="setLang('zh-CN', this)">中国語</button>
    <button onclick="setLang('id', this)">インドネシア語</button>
  </div>

  <div class="controls">
    <button id="startBtn" onclick="startMic()">マイク開始</button>
    <button id="stopBtn" onclick="stopMic()">マイク停止</button>
  </div>

  <div id="status">待機中</div>

  <div class="label">音声認識された日本語</div>
  <div id="sourceText"></div>

  <div class="label">手入力でも翻訳できます</div>
  <textarea id="inputText" placeholder="ここに日本語を入力"></textarea>

  <div class="controls">
    <button style="background:#007aff;" onclick="translateManual()">翻訳する</button>
  </div>

  <script>
    const GAS_URL = "ここにGASのウェブアプリURLを貼ってください";

    let targetLang = "vi";
    let recognition = null;
    let recognizing = false;

    function setLang(lang, btn) {
      targetLang = lang;

      document.querySelectorAll(".tabs button").forEach(function(button) {
        button.classList.remove("active");
      });

      btn.classList.add("active");
    }

    function translateManual() {
      const text = document.getElementById("inputText").value.trim();
      if (!text) return;

      document.getElementById("sourceText").textContent = text;
      translateText(text);
    }

    function translateText(text) {
      document.getElementById("status").textContent = "翻訳中...";

      const callbackName = "callback_" + Date.now();

      window[callbackName] = function(data) {
        if (data.error) {
          document.getElementById("translatedBox").textContent = "エラー：" + data.error;
        } else {
          document.getElementById("translatedBox").textContent = data.translated;
        }

        document.getElementById("status").textContent = "翻訳完了";

        delete window[callbackName];
        script.remove();
      };

      const script = document.createElement("script");
      script.src =
        GAS_URL +
        "?text=" + encodeURIComponent(text) +
        "&target=" + encodeURIComponent(targetLang) +
        "&callback=" + callbackName;

      document.body.appendChild(script);
    }

    function setupSpeechRecognition() {
      const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        alert("このブラウザは音声入力に対応していません。iPadのSafariで試してください。");
        return null;
      }

      const recog = new SpeechRecognition();

      recog.lang = "ja-JP";
      recog.continuous = true;
      recog.interimResults = false;

      recog.onstart = function() {
        recognizing = true;
        document.getElementById("status").textContent = "マイク入力中...";
      };

      recog.onresult = function(event) {
        const result = event.results[event.results.length - 1];
        const text = result[0].transcript;

        document.getElementById("sourceText").textContent = text;
        document.getElementById("inputText").value = text;

        translateText(text);
      };

      recog.onerror = function(event) {
        document.getElementById("status").textContent =
          "音声認識エラー：" + event.error;
      };

      recog.onend = function() {
        recognizing = false;
        document.getElementById("status").textContent = "マイク停止中";
      };

      return recog;
    }

    function startMic() {
      if (!recognition) {
        recognition = setupSpeechRecognition();
      }

      if (recognition && !recognizing) {
        recognition.start();
      }
    }

    function stopMic() {
      if (recognition && recognizing) {
        recognition.stop();
      }
    }
  </script>

</body>
</html>
